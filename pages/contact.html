<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Jean Manuel Yao</title>
  <link rel="stylesheet" href="../css/style.css">

  <style>
    .page-header {
      padding: 4rem 2.5rem 2rem;
      border-bottom: 1px solid var(--border);
      max-width: 1100px;
      margin: 0 auto;
    }

    .contact-container {
      max-width: 800px;
      margin: 3rem auto;
      display: grid;
      gap: 2rem;
    }

    .contact-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      padding: 1.5rem;
      border-radius: 2px;
    }

    .contact-title {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 0.5rem;
      letter-spacing: 0.1em;
    }

    .contact-value {
      font-size: 16px;
      color: var(--text);
    }

    .contact-value a {
      color: var(--green);
      text-decoration: none;
    }

    .contact-value a:hover {
      text-decoration: underline;
    }

    .contact-form {
      display: grid;
      gap: 1rem;
    }

    input, textarea {
      width: 100%;
      padding: 0.75rem;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    button {
      padding: 0.75rem;
      background: var(--green);
      border: none;
      color: black;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>

  <nav>
    <a href="../index.html" class="nav-logo">JMY<span>.dev</span></a>
    <ul class="nav-links">
      <li><a href="../index.html">Home</a></li>
      <li><a href="projets.html">Experience</a></li>
      <li><a href="projets.html">Projects</a></li>
      <li><a href="competences.html">Skills</a></li>
      <li><a href="parcours.html">Background</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <main>
    <div class="page-header">
      <h1>Contact</h1>
    </div>

    <div class="contact-container">

      <!-- Infos -->
      <div class="contact-card">
        <div class="contact-title">EMAIL</div>
        <div class="contact-value">
          <a href="mailto:jeanmanuelyao60@gmail.com">jeanmanuelyao60@gmail.com</a>
        </div>
      </div>

      <div class="contact-card">
        <div class="contact-title">LINKEDIN</div>
        <div class="contact-value">
          <a href="https://www.linkedin.com/in/jean-manuel-yao-baa3041a2/" target="_blank">
            linkedin.com/in/jean-manuel-yao
          </a>
        </div>
      </div>

      <div class="contact-card">
        <div class="contact-title">LOCATION</div>
        <div class="contact-value">
          Vélizy-Villacoublay, France
        </div>
      </div>

      <!-- Formulaire -->
      <div class="contact-card">
        <div class="contact-title">CONTACT ME</div>

        <form class="contact-form">
          <input type="text" placeholder="Name" required>
          <input type="email" placeholder="Email" required>
          <textarea placeholder="Message" required></textarea>
          <button type="submit">Send</button>
        </form>

      </div>

    </div>
  </main>

</body>
</html>
